<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fernando - Contato Profissional</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
width:90%;
max-width:420px;
background:#111827;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:3px solid #3b82f6;
}

h1{
font-size:26px;
margin-bottom:5px;
}

.profissao{
font-size:15px;
color:#94a3b8;
margin-bottom:30px;
}

.links{
display:flex;
flex-direction:column;
gap:15px;
}

.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:#1f2937;
padding:15px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
font-size:16px;
}

.link-btn:hover{
background:#3b82f6;
transform:translateY(-3px);
}

footer{
margin-top:25px;
font-size:12px;
color:#64748b;
}

</style>

</head>

<body>

<div class="container">

<img src="foto.jpg" class="profile-img">

<h1>Fernando</h1>

<div class="profissao">
Manutenção de Ar Condicionado e Aquecedores
</div>

<div class="links">

<a class="link-btn" href="https://wa.me/5511999999999" target="_blank">
📱 WhatsApp
</a>

<a class="link-btn" href="tel:+5511999999999">
📞 Ligar
</a>

<a class="link-btn" href="https://instagram.com/seuinstagram" target="_blank">
📷 Instagram
</a>

<a class="link-btn" href="#">
📍 Solicitar Orçamento
</a>

</div>

<footer>
Cartão de contato digital
</footer>

</div>

</body>
</html>
